<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="node-g" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>
    <radialGradient id="core-g" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#cccccc"/>
      <stop offset="100%" stop-color="#777777"/>
    </radialGradient>
    <linearGradient id="line-active" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="line-idle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg-glow)"/>
  <circle cx="100" cy="100" r="66" stroke="#ffffff" stroke-width="0.5" fill="none" opacity="0.06"/>
  <circle cx="100" cy="100" r="44" stroke="#ffffff" stroke-width="0.4" fill="none" opacity="0.08"/>
  <!-- Top -->
  <circle cx="100" cy="34" r="6.5" fill="url(#node-g)"/>
  <line x1="100" y1="40" x2="100" y2="85" stroke="url(#line-active)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Top right -->
  <circle cx="157" cy="67" r="5.5" fill="url(#node-g)" opacity="0.78"/>
  <line x1="153" y1="70" x2="113" y2="93" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Bottom right -->
  <circle cx="157" cy="133" r="5" fill="#ffffff" opacity="0.2"/>
  <line x1="153" y1="130" x2="113" y2="107" stroke="url(#line-idle)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom -->
  <circle cx="100" cy="166" r="5" fill="#ffffff" opacity="0.18"/>
  <line x1="100" y1="162" x2="100" y2="115" stroke="url(#line-idle)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom left -->
  <circle cx="43" cy="133" r="5" fill="#ffffff" opacity="0.18"/>
  <line x1="47" y1="130" x2="87" y2="107" stroke="url(#line-idle)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Top left -->
  <circle cx="43" cy="67" r="5.5" fill="url(#node-g)" opacity="0.64"/>
  <line x1="47" y1="70" x2="87" y2="93" stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.44"/>
  <!-- Centre -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.18"/>
  <circle cx="100" cy="100" r="12" fill="url(#core-g)"/>
  <circle cx="100" cy="100" r="4.5" fill="#000000"/>
</svg>
