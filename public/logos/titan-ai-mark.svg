<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- TITAN AI: 7-node distributed network -->
  <!-- Connections -->
  <line x1="50" y1="50" x2="80" y2="50" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="65" y2="76" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="35" y2="76" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="20" y2="50" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="35" y2="24" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <line x1="50" y1="50" x2="65" y2="24" stroke="#0A0A0A" stroke-width="1.2" opacity="0.5"/>
  <!-- Outer ring connections -->
  <line x1="80" y1="50" x2="65" y2="24" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <line x1="65" y1="24" x2="35" y2="24" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <line x1="35" y1="24" x2="20" y2="50" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <line x1="20" y1="50" x2="35" y2="76" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <line x1="35" y1="76" x2="65" y2="76" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <line x1="65" y1="76" x2="80" y2="50" stroke="#0A0A0A" stroke-width="0.8" opacity="0.25"/>
  <!-- Center node -->
  <circle cx="50" cy="50" r="5" fill="#0A0A0A"/>
  <!-- Outer nodes -->
  <circle cx="80" cy="50" r="3.5" fill="#0A0A0A" opacity="0.75"/>
  <circle cx="65" cy="76" r="3.5" fill="#0A0A0A" opacity="0.75"/>
  <circle cx="35" cy="76" r="3.5" fill="#0A0A0A" opacity="0.75"/>
  <circle cx="20" cy="50" r="3.5" fill="#0A0A0A" opacity="0.75"/>
  <circle cx="35" cy="24" r="3.5" fill="#0A0A0A" opacity="0.75"/>
  <circle cx="65" cy="24" r="3.5" fill="#0A0A0A" opacity="0.75"/>
</svg>
